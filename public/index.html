<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Download SC SATURN07 V2.3</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'Poppins', system-ui, -apple-system, sans-serif;
            padding: 1rem;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border-radius: 2rem;
            padding: 2rem 2rem 2.5rem;
            box-shadow: 0 25px 45px rgba(0,0,0,0.3), 0 0 0 1px rgba(255,255,255,0.1);
            text-align: center;
            max-width: 550px;
            width: 100%;
            transition: transform 0.2s ease;
        }
        .card:hover {
            transform: scale(1.01);
        }
        h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(to right, #c084fc, #60a5fa);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }
        .sub {
            color: #94a3b8;
            margin-bottom: 2rem;
            font-size: 0.9rem;
            border-bottom: 1px dashed #334155;
            display: inline-block;
            padding-bottom: 0.25rem;
        }
        .filename {
            background: #0f172a;
            padding: 0.75rem 1rem;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 2rem;
            font-weight: 500;
            color: #e2e8f0;
            border: 1px solid #334155;
            font-size: 0.9rem;
            word-break: break-all;
        }
        .filename::before {
            content: "📦";
            font-size: 1.2rem;
        }
        .btn-download {
            background: linear-gradient(95deg, #3b82f6, #a855f7);
            border: none;
            padding: 1rem 2rem;
            font-size: 1.4rem;
            font-weight: bold;
            border-radius: 60px;
            color: white;
            width: 100%;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 8px 20px rgba(59,130,246,0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            margin-bottom: 2rem;
        }
        .btn-download:hover:not(:disabled) {
            transform: translateY(-3px);
            filter: brightness(1.05);
            box-shadow: 0 15px 30px rgba(59,130,246,0.5);
        }
        .btn-download:active {
            transform: translateY(2px);
        }
        .btn-download:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        .stats-container {
            background: rgba(15, 23, 42, 0.7);
            border-radius: 1.5rem;
            padding: 1rem 1.2rem;
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            flex-wrap: wrap;
            margin-top: 1rem;
            border: 1px solid #334155;
        }
        .stat {
            flex: 1;
            text-align: center;
        }
        .stat-value {
            font-size: 1.8rem;
            font-weight: 800;
            color: #facc15;
            line-height: 1;
        }
        .stat-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-top: 6px;
        }
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .footer {
            margin-top: 1.8rem;
            font-size: 0.7rem;
            color: #475569;
        }
        .error-msg {
            background: #7f1a1a80;
            padding: 10px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-top: 1rem;
            color: #fecaca;
        }
        @media (max-width: 480px) {
            .card { padding: 1.5rem; }
            h1 { font-size: 1.6rem; }
            .btn-download { font-size: 1.2rem; }
        }
    </style>
</head>
<body>
<div class="card">
    <h1>⚡ SC SATURN07 ⚡</h1>
    <div class="sub">NO ENCRYPT · V2.3 FINAL</div>
    <div class="filename">SC SATURN07 V2.3.zip</div>
    <button class="btn-download" id="downloadBtn">
        <span>📥</span> DOWNLOAD NOW
    </button>
    <div class="stats-container" id="statsArea">
        <div class="stat">
            <div class="stat-value" id="totalDownloads">—</div>
            <div class="stat-label">Total Script di Download</div>
        </div>
        <div class="stat">
            <div class="stat-value" id="totalUsers">—</div>
            <div class="stat-label">Total User Database</div>
        </div>
    </div>
    <div class="footer">
        🔒 Sistem keamanan otomatis | Serverless Cloud
    </div>
    <div id="errorMsg" class="error-msg" style="display: none;"></div>
</div>

<script>
    const downloadBtn = document.getElementById('downloadBtn');
    const totalDownloadsSpan = document.getElementById('totalDownloads');
    const totalUsersSpan = document.getElementById('totalUsers');
    const errorDiv = document.getElementById('errorMsg');

    // Fetch stats from API
    async function fetchStats() {
        try {
            const res = await fetch('/api/stats');
            const data = await res.json();
            if (data.totalDownloads !== undefined) {
                totalDownloadsSpan.textContent = data.totalDownloads.toLocaleString();
                totalUsersSpan.textContent = data.totalUsers.toLocaleString();
            } else {
                totalDownloadsSpan.textContent = '0';
                totalUsersSpan.textContent = '0';
            }
        } catch (err) {
            console.error('Gagal ambil statistik:', err);
            totalDownloadsSpan.textContent = 'err';
            totalUsersSpan.textContent = 'err';
        }
    }

    // Handle download click
    downloadBtn.addEventListener('click', async () => {
        // disable button & show loading
        const originalHTML = downloadBtn.innerHTML;
        downloadBtn.disabled = true;
        downloadBtn.innerHTML = '<div class="loader"></div> MENGARAHKAN...';
        errorDiv.style.display = 'none';

        try {
            const response = await fetch('/api/download', {
                method: 'GET',
                headers: { 'Content-Type': 'application/json' }
            });
            const result = await response.json();

            if (!response.ok || !result.success) {
                throw new Error(result.error || 'Gagal memproses download');
            }

            if (result.downloadUrl) {
                // Redirect ke URL download langsung dari MediaFire
                window.location.href = result.downloadUrl;
                // Refresh stats after 3 seconds (as download counted)
                setTimeout(fetchStats, 3000);
            } else {
                throw new Error('Link download tidak ditemukan');
            }
        } catch (err) {
            console.error(err);
            errorDiv.style.display = 'block';
            errorDiv.textContent = '⚠️ ' + (err.message || 'Terjadi kesalahan, coba lagi nanti');
            downloadBtn.disabled = false;
            downloadBtn.innerHTML = originalHTML;
        }
    });

    // Auto refresh stats setiap 15 detik
    fetchStats();
    setInterval(fetchStats, 15000);
</script>
</body>
              </html>
